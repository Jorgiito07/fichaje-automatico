name: Fichaje STOP

on:
  schedule:
    # Lunes a Jueves a las 15:15 España (14:15 UTC)
    - cron: '15 14 * * 1-4'
    # Viernes a las 12:30 España (11:30 UTC)
    - cron: '30 11 * * 5'
  workflow_dispatch:

jobs:
  stop_job:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install requests
        run: pip install requests
      - name: Ejecutar Stop
        run: python fichaje.py stop
        env:
          USERNAME: ${{ secrets.USERNAME }}
          PASSWORD: ${{ secrets.PASSWORD }}
